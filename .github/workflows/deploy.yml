name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Klonar koden från GitHub
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Sätter upp Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Skapa zip-filen som Elastic Beanstalk kräver för Docker-miljöer
    - name: Generate Deployment Package
      run: |
        zip -r deploy.zip Dockerfile pom.xml src/

    # 4. Konfigurera AWS-autentisering via Github Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-north-1

    # 5. Ladda upp och distribuera till Elastic Beanstalks
    - name: Deploy to AWS Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v22
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: 'cloudstore-backend'
        environment_name: 'Cloudstorebackend-env'
        version_label: 'deploy-${{ github.sha }}'
        region: eu-north-1
        deployment_package: deploy.zip
